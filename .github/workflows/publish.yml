name: Publish

# Filename must match the "Workflow filename" configured on npmjs.com exactly.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun run verify:pack

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${PKG}"
            exit 1
          fi

      - name: Publish to npm (OIDC — do not set NODE_AUTH_TOKEN)
        run: npm publish --access public
